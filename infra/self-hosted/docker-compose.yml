# Hebo self-hosted — docker compose up -d
#
# Copy .env.example to .env and adjust as needed.
# All services start with sensible defaults — no required env vars.
#
# Usage:
#   cp .env.example .env
#   docker compose --env-file .env up -d

services:
  hebo:
    image: ghcr.io/hebo-ai/hebo:${HEBO_VERSION:-latest}
    restart: unless-stopped
    ports:
      - "${CONSOLE_PORT:-8520}:8520"
      - "${API_PORT:-8521}:8521"
      - "${GATEWAY_PORT:-8522}:8522"
      - "${AUTH_PORT:-8523}:8523"
      - "${MCP_PORT:-8524}:8524"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/hebo
      GREPTIME_HOST: greptimedb
      AUTH_SECRET: ${AUTH_SECRET:-}
      AUTH_URL: http://localhost:${AUTH_PORT:-8523}
      HEBO_MODE: ${HEBO_MODE:-standalone}
      # Optional: OAuth
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-}
      # Optional: SMTP
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
    volumes:
      - hebo-data:/data
    depends_on:
      postgres:
        condition: service_healthy
      greptimedb:
        condition: service_started

  postgres:
    extends:
      file: ../dev/docker-compose.yaml
      service: postgres

  greptimedb:
    extends:
      file: ../dev/docker-compose.yaml
      service: greptimedb

volumes:
  hebo-data:
  postgres-data:
  greptimedb-data:
