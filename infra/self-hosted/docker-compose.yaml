# Hebo self-hosted — just run: docker compose up -d
#
# Works out of the box with sensible defaults. No .env file needed.
# To customise, create a .env file in this directory — it will override
# any default. See .env.example for the full variable reference.
#
# Usage:
#   docker compose up -d

services:
  hebo:
    image: 8monkey/hebo-platform:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8520:8520"
      - "127.0.0.1:8521:8521"
      - "127.0.0.1:8522:8522"
      - "127.0.0.1:8523:8523"
      - "127.0.0.1:8524:8524"
    environment:
      AUTH_SECRET: ${AUTH_SECRET:-change-me-in-production}
      POSTGRES_URL: ${POSTGRES_URL:-postgresql://postgres:password@postgres:5432/hebo}
      GREPTIME_HOST: ${GREPTIME_HOST:-greptimedb}
    env_file:
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      greptimedb:
        condition: service_healthy

  postgres:
    image: postgres:17.6
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: hebo
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  greptimedb:
    image: greptime/greptimedb:v1.0.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
      - "127.0.0.1:4001:4001"
      - "127.0.0.1:4002:4002"
      - "127.0.0.1:4003:4003"
    volumes:
      - greptimedb-data:/greptimedb_data
    command: >-
      standalone start
      --http-addr 0.0.0.0:4000
      --rpc-bind-addr 0.0.0.0:4001
      --mysql-addr 0.0.0.0:4002
      --postgres-addr 0.0.0.0:4003
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4000/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres-data:
  greptimedb-data:
