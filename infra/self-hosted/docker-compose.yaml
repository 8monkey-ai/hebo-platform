# Hebo self-hosted — docker compose up -d
#
# Copy .env.example to .env and adjust as needed.
# All services start with sensible defaults — no required env vars.
#
# Usage:
#   cp .env.example .env
#   docker compose --env-file .env up -d

services:
  hebo:
    image: ghcr.io/8monkey-ai/hebo-platform:${HEBO_VERSION:-latest}
    restart: unless-stopped
    ports:
      - "8520:8520"
      - "8521:8521"
      - "8522:8522"
      - "8523:8523"
      - "8524:8524"
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_URL: ${POSTGRES_URL:-postgresql://postgres:${POSTGRES_PASSWORD:-hebo}@postgres:5432/hebo}
      GREPTIME_HOST: ${GREPTIME_HOST:-greptimedb}
    volumes:
      - hebo-secrets:/data/secrets
    depends_on:
      postgres:
        condition: service_healthy
      greptimedb:
        condition: service_healthy

  postgres:
    image: postgres:17.6
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hebo}
      POSTGRES_DB: hebo
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  greptimedb:
    image: greptime/greptimedb:v1.0.0
    restart: unless-stopped
    volumes:
      - greptimedb-data:/greptimedb_data
    command: >-
      standalone start
      --http-addr 0.0.0.0:4000
      --rpc-bind-addr 0.0.0.0:4001
      --mysql-addr 0.0.0.0:4002
      --postgres-addr 0.0.0.0:4003
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4000/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  hebo-secrets:
  postgres-data:
  greptimedb-data:
