# Hebo self-hosted — docker compose up -d
#
# Copy .env.example to .env and adjust as needed.
# All services start with sensible defaults — no required env vars.
#
# Usage:
#   cp .env.example .env
#   docker compose --env-file .env up -d

services:
  hebo:
    image: ghcr.io/8monkey-ai/hebo-platform:${HEBO_VERSION:-latest}
    restart: unless-stopped
    ports:
      - "8520:8520"
      - "8521:8521"
      - "8522:8522"
      - "8523:8523"
      - "8524:8524"
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:password@postgres:5432/hebo}
      GREPTIME_HOST: ${GREPTIME_HOST:-greptimedb}
      AUTH_URL: ${AUTH_URL:-http://localhost:8523}
      HEBO_MODE: ${HEBO_MODE:-standalone}
    volumes:
      - hebo-data:/data
    depends_on:
      postgres:
        condition: service_started
      greptimedb:
        condition: service_started

  postgres:
    extends:
      file: ../dev/docker-compose.yaml
      service: postgres

  greptimedb:
    extends:
      file: ../dev/docker-compose.yaml
      service: greptimedb

volumes:
  hebo-data:
  postgres-data:
  greptimedb-data:
