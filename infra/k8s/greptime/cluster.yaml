apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: <CLUSTER_NAME>
  region: <AWS_REGION>
  version: "1.35"

vpc:
  id: <VPC_ID>
  subnets:
    public:
      <AWS_REGION>a: { id: <PUBLIC_SUBNET_A> }
      <AWS_REGION>b: { id: <PUBLIC_SUBNET_B> }
      <AWS_REGION>c: { id: <PUBLIC_SUBNET_C> }
    private:
      <AWS_REGION>a: { id: <PRIVATE_SUBNET_A> }
      <AWS_REGION>b: { id: <PRIVATE_SUBNET_B> }
      <AWS_REGION>c: { id: <PRIVATE_SUBNET_C> }

iam:
  withOIDC: true
  podIdentityAssociations:
    - namespace: kube-system
      serviceAccountName: external-dns
      createServiceAccount: true
      wellKnownPolicies:
        externalDNS: true

addonsConfig:
  autoApplyPodIdentityAssociations: true

addons:
  - name: eks-pod-identity-agent
  - name: aws-ebs-csi-driver
  - name: aws-load-balancer-controller
    wellKnownPolicies:
      awsLoadBalancerController: true

managedNodeGroups:
  - name: ng-arm
    amiFamily: AmazonLinux2023
    instanceType: m7g.large
    desiredCapacity: 3
    minSize: 3
    maxSize: 3
    privateNetworking: true
