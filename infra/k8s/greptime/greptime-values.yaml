base:
  serviceAccountName: greptime-sa

frontend:
  replicas: 3
  service:
    type: LoadBalancer
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-scheme: "internal"

meta:
  replicas: 3
  configData: |
    backend_tls.mode = "require"
  backendStorage:
    postgresql:
      host: "<AURORA_HOST>"
      port: 5432
      database: "<AURORA_DATABASE>"
      table: "greptime_metakv"
      electionLockID: 42
      credentials:
        existingSecretName: "meta-postgresql-credentials"

datanode:
  replicas: 3
  storage:
    storageClassName: gp3

objectStorage:
  s3:
    bucket: "<S3_BUCKET>"
    region: "<AWS_REGION>"
    root: "<S3_PREFIX>"
    endpoint: "s3.<AWS_REGION>.amazonaws.com"
    enableVirtualHostStyle: true

dedicatedWAL:
  enabled: true
  raftEngine:
    fs:
      storageClassName: gp3
      storageSize: 50Gi
