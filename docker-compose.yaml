services:
  postgres:
    container_name: hebo-postgres
    image: postgres:17.6
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: local
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  greptimedb:
    container_name: greptime
    image: greptime/greptimedb:v1.0.0-rc.1
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - greptimedb-data:/greptimedb_data
    command: standalone start --http-addr 0.0.0.0:4000

volumes:
  postgres-data:
  greptimedb-data:


