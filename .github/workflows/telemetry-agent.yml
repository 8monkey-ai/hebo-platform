name: Telemetry Anomaly Agent

permissions:
  contents: read
  issues: write
  id-token: write

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run detection without creating/modifying issues"
        required: false
        default: false
        type: boolean

jobs:
  detect:
    name: Detect Telemetry Anomalies
    runs-on: ubuntu-latest
    env:
      GREPTIMEDB_HOST: localhost
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
      AWS_REGION: ${{ secrets.AWS_REGION }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Start SSM tunnel to GreptimeDB
        run: |
          aws ssm start-session \
            --target "${{ secrets.GREPTIMEDB_SSM_TARGET }}" \
            --document-name AWS-StartPortForwardingSessionToRemoteHost \
            --parameters '{"host":["${{ secrets.GREPTIMEDB_HOST }}"],"portNumber":["4003"],"localPortNumber":["4003"]}' &
          SSM_PID=$!
          echo "SSM_PID=$SSM_PID" >> "$GITHUB_ENV"
          ready=false
          for i in $(seq 1 30); do
            if pg_isready -h localhost -p 4003 2>/dev/null; then
              echo "Tunnel is ready"
              ready=true
              break
            fi
            sleep 1
          done
          if [ "$ready" != "true" ]; then
            echo "::error::SSM tunnel to GreptimeDB did not become ready within 30 seconds"
            exit 1
          fi

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Run Claude Code anomaly detection
        uses: anthropics/claude-code-action@v1.0.89
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          use_bedrock: "true"
          prompt: |
            Run the /telemetry-anomaly skill. Execute the full anomaly detection pipeline:

            1. Connect to GreptimeDB at localhost:4003
            2. Discover schema and confirm table availability
            3. Check for recent deploys
            4. Run Phase A metrics scan across all detectors
            5. Run Phase B trace/log drill-down for flagged dimensions
            6. Manage GitHub issues (create/update/close) based on findings
            7. Output a summary of all actions taken

            Environment: GREPTIMEDB_HOST=localhost, DRY_RUN=${{ env.DRY_RUN }}

            If DRY_RUN is true, log what would happen without modifying any issues.
          claude_args: |
            --model us.anthropic.claude-opus-4-6-v1
            --allowedTools Bash,Read,Glob,Grep
            --max-turns 50
        env:
          GREPTIMEDB_HOST: localhost
          DRY_RUN: ${{ env.DRY_RUN }}
          ANOMALY_Z_THRESHOLD: ${{ vars.ANOMALY_Z_THRESHOLD || '3' }}
          ANOMALY_TREND_THRESHOLD_PCT: ${{ vars.ANOMALY_TREND_THRESHOLD_PCT || '20' }}
          ANOMALY_ABS_5XX_RATE_HTTP: ${{ vars.ANOMALY_ABS_5XX_RATE_HTTP || '0.05' }}
          ANOMALY_ABS_4XX_RATE_HTTP: ${{ vars.ANOMALY_ABS_4XX_RATE_HTTP || '0.25' }}
          ANOMALY_ABS_P95_MS_HTTP: ${{ vars.ANOMALY_ABS_P95_MS_HTTP || '5000' }}
          ANOMALY_ABS_P99_MS_HTTP: ${{ vars.ANOMALY_ABS_P99_MS_HTTP || '10000' }}
          ANOMALY_ABS_5XX_RATE_GENAI: ${{ vars.ANOMALY_ABS_5XX_RATE_GENAI || '0.10' }}
          ANOMALY_ABS_4XX_RATE_GENAI: ${{ vars.ANOMALY_ABS_4XX_RATE_GENAI || '0.25' }}
          ANOMALY_ABS_P95_MS_GENAI: ${{ vars.ANOMALY_ABS_P95_MS_GENAI || '120000' }}
          ANOMALY_ABS_P99_MS_GENAI: ${{ vars.ANOMALY_ABS_P99_MS_GENAI || '180000' }}
          ANOMALY_ABS_ERROR_RATE_SQL: ${{ vars.ANOMALY_ABS_ERROR_RATE_SQL || '0.05' }}
          ANOMALY_ABS_P95_MS_SQL: ${{ vars.ANOMALY_ABS_P95_MS_SQL || '2000' }}
          ANOMALY_ABS_P99_MS_SQL: ${{ vars.ANOMALY_ABS_P99_MS_SQL || '5000' }}
          ANOMALY_ABS_ERROR_LOG_COUNT: ${{ vars.ANOMALY_ABS_ERROR_LOG_COUNT || '100' }}

      - name: Cleanup SSM tunnel
        if: always()
        run: |
          if [ -n "$SSM_PID" ]; then
            kill "$SSM_PID" 2>/dev/null || true
          fi
